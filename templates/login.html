<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Absensi Face ID</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bg:      #f3f5f9;
      --surface: #ffffff;
      --card:    #ffffff;
      --border:  #d8dde8;
      --accent:  #4f46e5;
      --accent-dim: rgba(79,70,229,.08);
      --red:     #dc2626;
      --text:    #111827;
      --muted:   #6b7280;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }

    /* Decorative blobs */
    body::before, body::after {
      content: '';
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
    }
    body::before {
      width: 400px; height: 400px;
      background: rgba(108,99,255,.08);
      top: -100px; right: -100px;
    }
    body::after {
      width: 300px; height: 300px;
      background: rgba(108,99,255,.05);
      bottom: -80px; left: -80px;
    }

    .login-wrapper { width: 100%; max-width: 420px; position: relative; z-index: 1; }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 34px 30px;
      box-shadow: 0 18px 45px rgba(15,23,42,.12);
    }

    .login-logo {
      width: 84px; height: 84px;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      margin: 0 auto 18px;
      background: transparent;
    }
    .login-logo img {
      width: 100%; height: 100%; object-fit: contain;
      display: block;
    }

    .login-title {
      text-align: center; font-size: 1.3rem; font-weight: 700; margin-bottom: 4px;
    }
    .login-sub {
      text-align: center; font-size: .82rem;
      color: var(--muted); margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: .79rem; color: var(--muted); font-weight: 500; margin-bottom: 6px; }

    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 15px; pointer-events: none;
    }
    .form-control {
      width: 100%; padding: 10px 13px 10px 38px;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--card); color: var(--text);
      font-size: .9rem; outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.15);
    }
    .form-control::placeholder { color: var(--muted); }

    .btn-login {
      width: 100%; padding: 11px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff;
      font-size: .93rem; font-weight: 700; cursor: pointer;
      margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .15s, box-shadow .15s;
      letter-spacing: .01em;
    }
    .btn-login:hover {
      opacity: .88;
      box-shadow: 0 0 24px rgba(108,99,255,.35);
    }
    .btn-login:active { opacity: .75; }

    .alert-error {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 14px; border-radius: 10px; margin-bottom: 18px;
      font-size: .84rem;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      color: var(--red);
    }

    hr.divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

    .health-text { text-align: center; font-size: .76rem; color: var(--muted); }
    .health-text a { color: var(--accent); text-decoration: none; }
    .health-text a:hover { text-decoration: underline; }

    @media (max-width: 420px) {
      .login-card { padding: 28px 22px 26px; border-radius: 14px; }
      .login-title { font-size: 1.15rem; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <img src="{{ url_for('serve_asset', filename='Logo_Alpharich.webp') }}" alt="Alpharich Logo">
      </div>
      <div class="login-title">Absensi Face ID</div>
      <div class="login-sub">Masuk untuk melakukan absensi</div>

      {% for cat, msg in get_flashed_messages(with_categories=true) %}
      <div class="alert-error">
        <i class="bi bi-x-circle-fill" style="flex-shrink:0;"></i>
        {{ msg }}
      </div>
      {% endfor %}

      <form method="POST" autocomplete="on">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <i class="bi bi-envelope input-icon"></i>
            <input class="form-control" type="email" name="email"
                   placeholder="nama@perusahaan.com" required autofocus autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input class="form-control" type="password" name="password"
                   placeholder="Masukkan password" required autocomplete="current-password">
          </div>
        </div>
        <button class="btn-login" type="submit">
          <i class="bi bi-box-arrow-in-right"></i> Masuk
        </button>
      </form>

      <hr class="divider">
      <p class="health-text">© 2025 Alpharich Digital Solution. All rights reserved.</p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
