<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · Absensi Face ID</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0d14; --surface: #13151f; --card: #1a1d2e;
      --border: #252840; --accent: #6366f1; --red: #ef4444;
      --text: #e2e8f0; --muted: #6b7280;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 16px;
    }

    .login-wrap { width: 100%; max-width: 380px; }

    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 36px 32px 32px;
    }

    .login-logo {
      width: 56px; height: 56px; border-radius: 16px;
      background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.3);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); margin: 0 auto 16px;
    }
    .login-title { text-align: center; font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
    .login-sub   { text-align: center; font-size: .83rem; color: var(--muted); margin-bottom: 28px; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: .81rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .input-wrap  { position: relative; }
    .input-icon  { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); display: flex; pointer-events: none; }
    .form-control {
      width: 100%; padding: 10px 14px 10px 38px;
      border-radius: 9px; border: 1px solid var(--border);
      background: var(--card); color: var(--text);
      font-size: .9rem; outline: none; transition: border-color .15s;
      -webkit-appearance: none;
    }
    .form-control:focus { border-color: var(--accent); }

    .btn-login {
      width: 100%; padding: 11px; border-radius: 9px; border: none;
      background: var(--accent); color: #fff; font-size: .93rem;
      font-weight: 700; cursor: pointer; margin-top: 6px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .15s;
    }
    .btn-login:hover { opacity: .88; }
    .btn-login:active { opacity: .75; }

    .alert {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 14px; border-radius: 9px; margin-bottom: 18px;
      font-size: .85rem; background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25); color: var(--red);
    }

    .divider { height: 1px; background: var(--border); margin: 22px 0; }

    .health-link { text-align: center; font-size: .78rem; color: var(--muted); }
    .health-link a { color: var(--accent); text-decoration: none; }
    .health-link a:hover { text-decoration: underline; }

    @media (max-width: 400px) {
      .login-card { padding: 28px 20px 24px; border-radius: 14px; }
      .login-title { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <i data-lucide="scan-face" style="width:26px;height:26px;"></i>
      </div>
      <div class="login-title">Absensi Face ID</div>
      <div class="login-sub">Masuk untuk melakukan absensi</div>

      {% for cat, msg in get_flashed_messages(with_categories=true) %}
      <div class="alert">
        <i data-lucide="x-circle" style="width:15px;height:15px;flex-shrink:0"></i>
        {{ msg }}
      </div>
      {% endfor %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <span class="input-icon"><i data-lucide="mail" style="width:15px;height:15px;"></i></span>
            <input class="form-control" type="email" name="email" placeholder="nama@perusahaan.com" required autofocus autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <span class="input-icon"><i data-lucide="lock" style="width:15px;height:15px;"></i></span>
            <input class="form-control" type="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
          </div>
        </div>
        <button class="btn-login" type="submit">
          <i data-lucide="log-in" style="width:16px;height:16px;"></i>
          Masuk
        </button>
      </form>

      <div class="divider"></div>
      <div class="health-link">
        Status sistem: <a href="/health" target="_blank">/health</a>
      </div>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
